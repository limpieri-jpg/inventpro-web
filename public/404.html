<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>InventPro</title>
  <script>
    // GitHub Pages SPA redirect
    // Prende il path corrente e lo passa come query string alla index.html
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/inventpro-web/' +
      '?p=' + encodeURIComponent(l.pathname.slice('/inventpro-web/'.length) + l.search) +
      (l.hash || '')
    );
  </script>
</head>
<body></body>
</html>
